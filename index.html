<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="60">
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Slideshow */
#slideshow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  height: 80%;
  object-fit: contain;
  z-index: 1;
}

/* Ticker */
#ticker {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  z-index: 2;
}

#tickerText {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scrollLeft 60s linear infinite;
  font-size: 28px;
  font-weight: bold;
}

@keyframes scrollLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>
<body>

<!-- Slideshow -->
<img id="slideshow" src="">

<!-- Donor ticker -->
<div id="ticker">
  <div id="tickerText">Loading donors...</div>
</div>

<script>
// ================================
// Configuration (replace below)
// ================================

const apiKey = "AIzaSyD-edIrNmPWggpa9sQV8wnGJLt-cH18pw4";
const folderId = "15NZTsQ1oAoJNXat-QPbLfDwNIz5Fh9n8";

// ================================
// 1. Load Images from Drive Folder
// ================================

// Drive API URL to list files in folder
const driveFilesUrl =
  `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'&key=${apiKey}&fields=files(id,name,mimeType)`;

let images = [];
let currentIndex = 0;
const slideshowEl = document.getElementById("slideshow");

fetch(driveFilesUrl)
  .then(res => res.json())
  .then(data => {
    images = data.files.map(file =>
      `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${apiKey}`
    );

    if (images.length === 0) {
      slideshowEl.alt = "No images found in Drive folder.";
      return;
    }

    // Start slideshow
    showNextImage();
    setInterval(showNextImage, 3000);
  })
  .catch(err => {
    console.error("Drive API error:", err);
    slideshowEl.alt = "Error loading images.";
  });

function showNextImage() {
  slideshowEl.src = images[currentIndex];
  currentIndex = (currentIndex + 1) % images.length;
}

// =================================
// 2. Load Donor Ticker
// =================================
const csvUrl =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcOCFw-9EJbvNN4dRxmJrR50mmHlzNQg8Q19rJhCQbm0icPRD3aUsK7xlq26_NHQ/pub?output=csv";

fetch(csvUrl)
  .then(res => res.text())
  .then(data => {
    let rows = data.trim().split("\n").slice(1);
    let text = "Bhumidaan donors: ";
    text += rows.map(r => {
      let c = r.split(",");
      return `${c[1]}: ${c[2]} SQFT`;
    }).join("   —   ");
    document.getElementById("tickerText").innerText = text;
  });
</script>

</body>
</html>
