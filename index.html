<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="60">
<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* Center flyer */
#flyer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 90%;
  max-height: 80%;
}

/* Bottom ticker */
#ticker {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: rgba(0,0,0,0.85);
  overflow: hidden;
  display: flex;
  align-items: center;
}

#tickerText {
  white-space: nowrap;
  padding-left: 100%;
  animation: scrollLeft 25s linear infinite;
  font-size: 30px;
}

@keyframes scrollLeft {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}
</style>
</head>

<body>

<img id="flyer">

<div id="ticker">
  <div id="tickerText">Loading donors...</div>
</div>

<script>
// Google Sheet CSV (your donor list)
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcOCFw-9EJbvNN4dRxmJrR50mmHlzNQg8Q19rJhCQbm0icPRD3aUsK7xlq26_NHQ/pub?output=csv";

// Your flyer images (direct links from Google Drive)
const flyers = [
  "https://drive.google.com/uc?export=view&id=1z-V2jxa2PDbX6ps9brjjhrsLVDw2T8OI",
  "https://drive.google.com/uc?export=view&id=1SNutvIhou3ivCWmcFw899HvPRCp1KXKA"
];

let current = 0;

// Rotate flyers every 10 seconds
setInterval(() => {
  document.getElementById("flyer").src = flyers[current];
  current = (current + 1) % flyers.length;
}, 10000);

// Load donor ticker
fetch(csvUrl)
  .then(res => res.text())
  .then(data => {
    let rows = data.trim().split("\n").slice(1);
    let text = rows.map(r => {
      let c = r.split(",");
      return `${c[1]} — ${c[2]} SQFT — $${c[3]}`;
    }).join("   ⭐   ");
    document.getElementById("tickerText").innerText = text;
  });
</script>

</body>
</html>
