<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="60">
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Slideshow */
#slideshow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  height: 80%;
  object-fit: contain;
  z-index: 1;
}

/* Ticker */
#ticker {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: rgba(0,0,0,0.85);
  overflow: hidden;
  display: flex;
  align-items: center;
  z-index: 2;
}

#tickerTrack {
  display: flex;
  white-space: nowrap;
  animation: scrollLeft linear infinite;
}

.tickerItem {
  font-size: 28px;
  font-weight: bold;
  padding-right: 80px;
}

/* Smooth loop */
@keyframes scrollLeft {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* Fade edges (pro look) */
#ticker::before,
#ticker::after {
  content: "";
  position: absolute;
  width: 80px;
  height: 100%;
  top: 0;
  z-index: 3;
}

#ticker::before {
  left: 0;
  background: linear-gradient(to right, black, transparent);
}

#ticker::after {
  right: 0;
  background: linear-gradient(to left, black, transparent);
}
</style>
</head>

<body>

<!-- Slideshow -->
<img id="slideshow" src="">

<!-- Ticker -->
<div id="ticker">
  <div id="tickerTrack"></div>
</div>

<script>
// ================================
// CONFIG
// ================================
const apiKey = "YOUR_GOOGLE_API_KEY_HERE";
const folderId = "15NZTsQ1oAoJNXat-QPbLfDwNIz5Fh9n8";
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcOCFw-9EJbvNN4dRxmJrR50mmHlzNQg8Q19rJhCQbm0icPRD3aUsK7xlq26_NHQ/pub?output=csv";

// ================================
// GOOGLE DRIVE SLIDESHOW
// ================================
const driveUrl =
  `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'&key=${apiKey}&fields=files(id,name)`;

let images = [];
let index = 0;
const slide = document.getElementById("slideshow");

// Fetch images
function loadImages() {
  return fetch(driveUrl)
    .then(res => res.json())
    .then(data => {
      images = data.files.map(file =>
        `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${apiKey}`
      );
    })
    .catch(err => {
      console.error("Drive fetch error:", err);
    });
}

// Show next image
function showNext() {
  if (images.length === 0) return;

  slide.src = images[index];
  index++;

  // When last image ends → reload images
  if (index >= images.length) {
    index = 0;
    loadImages(); // refresh list
  }
}

// Init slideshow
loadImages().then(() => {
  showNext();
  setInterval(showNext, 3000);
});

// ================================
// SMOOTH CONTINUOUS TICKER
// ================================
const tickerTrack = document.getElementById("tickerTrack");

fetch(csvUrl)
  .then(res => res.text())
  .then(data => {
    let rows = data.trim().split("\n").slice(1);

    let text = "Bhumidaan donors: ";
    text += rows.map(r => {
      let c = r.split(",");
      return `${c[1]}: ${c[2]} SQFT`;
    }).join("   —   ");

    tickerTrack.innerHTML = `
      <div class="tickerItem">${text}</div>
      <div class="tickerItem">${text}</div>
    `;

    // Dynamic speed
    const duration = Math.max(20, text.length * 0.4);
    tickerTrack.style.animationDuration = duration + "s";
  })
  .catch(() => {
    tickerTrack.innerHTML = `
      <div class="tickerItem">Donor list not available</div>
      <div class="tickerItem">Donor list not available</div>
    `;
    tickerTrack.style.animationDuration = "30s";
  });
</script>

</body>
</html>
