<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="60">
<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* Center Google Slides iframe */
#slides {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  height: 80%;
  border: none;
  z-index: 1;
}

/* Overlay to cover entire Google Slides bottom control bar */
#slidesControlsCover {
  position: absolute;
  top: calc(50% + 40%);
  left: 50%;
  width: 90%;
  height: 60px;
  background: black;
  z-index: 2;
  pointer-events: none;
  transform: translate(-50%, 0);
}

/* Bottom ticker */
#ticker {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: rgba(0,0,0,0.85);
  overflow: hidden;
  display: flex;
  align-items: center;
  z-index: 3;
}

#tickerText {
  display: inline-block;
  white-space: nowrap; /* single line */
  padding-left: 100%;
  animation: scrollLeft 60s linear infinite;
  font-size: 28px;
  font-weight: bold;
}

@keyframes scrollLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<!-- Google Slides embed -->
<iframe
  id="slides"
  src="https://docs.google.com/presentation/d/e/2PACX-1vSk4n47IYjy64hbH-KF0P9GG7uQTw1WHYoWBJlqk1jNy9CC5BUWFGsTXZf3i0K2-E_4b355Ot6I6HpX/pubembed?start=true&loop=true&delayms=3000"
  frameborder="0"
  allowfullscreen="true"
  mozallowfullscreen="true"
  webkitallowfullscreen="true">
</iframe>

<!-- Overlay to cover entire Google Slides bottom control bar -->
<div id="slidesControlsCover"></div>

<!-- Donor ticker -->
<div id="ticker">
  <div id="tickerText">Loading donors...</div>
</div>

<script>
// Google Sheet CSV URL
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcOCFw-9EJbvNN4dRxmJrR50mmHlzNQg8Q19rJhCQbm0icPRD3aUsK7xlq26_NHQ/pub?output=csv";

// Load donor list in desired format
fetch(csvUrl)
  .then(res => res.text())
  .then(data => {
    let rows = data.trim().split("\n").slice(1); // skip header
    let text = "Bhumidaan donors: ";
    text += rows.map(r => {
      let c = r.split(",");
      return `${c[1]}: ${c[2]} SQFT`;
    }).join(" - "); // separator between donors
    document.getElementById("tickerText").innerText = text;
  });
</script>

</body>
</html>
